<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Riiiple demo</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: linear-gradient(145deg, #1a1d26 0%, #0f1117 100%);
        color: #e8eaef;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 2rem;
        padding: 2rem;
      }
      h1 {
        font-weight: 600;
        font-size: 1.25rem;
        margin: 0;
        opacity: 0.9;
      }
      p {
        margin: 0;
        max-width: 28rem;
        text-align: center;
        line-height: 1.5;
        opacity: 0.65;
        font-size: 0.9rem;
      }
      .section-label {
        font-size: 0.7rem;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        opacity: 0.4;
        margin: 0;
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        justify-content: center;
      }
      button {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.06);
        color: inherit;
        padding: 0.65rem 1.1rem;
        border-radius: 10px;
        font: inherit;
        cursor: pointer;
        transition:
          background 0.15s,
          border-color 0.15s;
      }
      button:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.2);
      }
      .card {
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(255, 255, 255, 0.03);
        border-radius: 14px;
        padding: 1.5rem 2rem;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 1rem;
        max-width: 24rem;
        width: 100%;
      }
      .card h2 {
        margin: 0;
        font-size: 1rem;
        font-weight: 500;
        opacity: 0.85;
      }
      .card p {
        font-size: 0.82rem;
      }
    </style>
  </head>
  <body>
    <h1>Riiiple</h1>
    <p>
      A tiny library that displaces actual DOM elements with a ripple effect.
      Click the buttons below to see it in action.
    </p>

    <p class="section-label">Page-wide ripple (buttons trigger full page)</p>
    <div class="row">
      <button type="button" class="page-trigger">Ripple Page</button>
      <button type="button" class="page-trigger">Another</button>
    </div>

    <p class="section-label">Scoped ripple (button only affects the card)</p>
    <div class="card" id="demo-card">
      <h2>Scoped Card</h2>
      <p>Only this card displaces when you click the button below.</p>
      <button type="button" id="card-trigger">Ripple Card</button>
    </div>

    <script type="module" src="/src/demo.ts"></script>
  </body>
</html>
