<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Riiiple demo</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        min-height: 100vh;
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        background: linear-gradient(145deg, #1a1d26 0%, #0f1117 100%);
        color: #e8eaef;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 1.5rem;
        padding: 2rem;
      }
      h1 {
        font-weight: 600;
        font-size: 1.25rem;
        margin: 0;
        opacity: 0.9;
      }
      p {
        margin: 0;
        max-width: 28rem;
        text-align: center;
        line-height: 1.5;
        opacity: 0.65;
        font-size: 0.9rem;
      }
      .row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.75rem;
        justify-content: center;
      }
      button {
        appearance: none;
        border: 1px solid rgba(255, 255, 255, 0.12);
        background: rgba(255, 255, 255, 0.06);
        color: inherit;
        padding: 0.65rem 1.1rem;
        border-radius: 10px;
        font: inherit;
        cursor: pointer;
        transition:
          background 0.15s,
          border-color 0.15s;
      }
      button:hover {
        background: rgba(255, 255, 255, 0.1);
        border-color: rgba(255, 255, 255, 0.2);
      }
      a {
        color: #7ab8ff;
      }
    </style>
  </head>
  <body>
    <h1>Riiiple</h1>
    <p>
      Click anywhere on the page to trigger a ripple that displaces the actual
      DOM elements. Buttons remain fully interactive.
    </p>
    <div class="row">
      <button type="button">Primary</button>
      <button type="button">Another</button>
      <button type="button">Ripple</button>
    </div>
    <script type="module" src="/src/demo.ts"></script>
  </body>
</html>
